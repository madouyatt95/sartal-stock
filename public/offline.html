<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#123f3a" />
    <title>Sártal · Hors connexion</title>
    <style>
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 20px; background: #edf3f1; color: #142d2a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(480px, 100%); display: grid; gap: 14px; padding: 28px; border: 1px solid #d4e2de; border-top: 5px solid #176e63; background: #fff; box-shadow: 0 18px 45px rgba(24, 67, 60, .12); }
      img { width: 54px; height: 54px; border-radius: 8px; }
      span { color: #176e63; font-size: 12px; font-weight: 800; }
      h1 { margin: 0; font-size: 27px; line-height: 1.15; }
      p { margin: 0; color: #657a75; font-size: 15px; line-height: 1.6; }
      button { min-height: 46px; border: 0; border-radius: 6px; background: #176e63; color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; }
      small { padding-top: 12px; border-top: 1px solid #e0e8e6; color: #84938f; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <img src="./brand-mark.svg" alt="Sártal" />
      <span>CONTINUITÉ DE SERVICE</span>
      <h1>Le réseau est momentanément indisponible</h1>
      <p>Les écrans déjà chargés et les actions enregistrées sur cet appareil restent disponibles. Reconnectez-vous puis relancez la synchronisation.</p>
      <button type="button" onclick="window.location.reload()">Réessayer maintenant</button>
      <small>Sártal conserve la file locale jusqu’au retour de la connexion.</small>
    </main>
  </body>
</html>
